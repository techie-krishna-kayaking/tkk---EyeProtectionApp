name: tkk_eyeguard
description: "TKK EyeGuard — a lightweight, cross-platform app that reminds you to rest your eyes every hour while intelligently avoiding interruptions during meetings."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # State management & DI
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Local persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Desktop integration (tray / menu bar / window)
  tray_manager: ^0.3.2
  window_manager: ^0.4.3
  launch_at_startup: ^0.5.1

  # Utilities
  intl: ^0.19.0
  package_info_plus: ^8.1.2
  logging: ^1.3.0
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  riverpod_generator: ^2.6.3
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  image_path: "assets/icons/app_icon.png"
  android: true
  ios: true
  macos:
    generate: true
    image_path: "assets/icons/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icons/app_icon.png"
    icon_size: 256
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
  # The UI requests the "Inter" font family and falls back to the platform
  # default until the font files are added. To bundle Inter, drop the .ttf
  # files into assets/fonts/ and uncomment the block below.
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
