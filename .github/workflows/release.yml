name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.32.0"

jobs:
  # ---------------------------------------------------------------------------
  # Android: signed-ready APK
  # ---------------------------------------------------------------------------
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter create --project-name tkk_eyeguard --platforms=android .
      - name: Align Android NDK version with plugins
        run: |
          python3 - <<'PY'
          from pathlib import Path

          p = Path('android/app/build.gradle.kts')
          s = p.read_text()

          s = s.replace(
              'ndkVersion = flutter.ndkVersion',
              'ndkVersion = "27.0.12077973"',
          )
          if 'isCoreLibraryDesugaringEnabled = true' not in s:
              s = s.replace(
                  'compileOptions {',
                  'compileOptions {\n        isCoreLibraryDesugaringEnabled = true',
                  1,
              )
          if 'coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:' not in s:
              s = s.replace(
                  'dependencies {',
                  'dependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.5")',
                  1,
              )

          p.write_text(s)
          print('Patched android/app/build.gradle.kts successfully')
          PY
      - run: flutter pub get
      - name: Build APK
        run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            build/app/outputs/flutter-apk/app-release.apk

  # ---------------------------------------------------------------------------
  # macOS: .app + .dmg
  # ---------------------------------------------------------------------------
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter config --enable-macos-desktop
      - run: flutter create --project-name tkk_eyeguard --platforms=macos .
      - run: flutter pub get
      - name: Build macOS release
        run: flutter build macos --release
      - name: Package DMG
        run: |
          brew install create-dmg
          APP_PATH=$(find build/macos/Build/Products/Release -maxdepth 1 -name "*.app" | head -n 1)
          create-dmg \
            --volname "TKK EyeGuard" \
            --window-size 540 380 \
            --icon-size 110 \
            --app-drop-link 380 180 \
            "TKK-EyeGuard.dmg" \
            "$APP_PATH" || true
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            TKK-EyeGuard.dmg

  # ---------------------------------------------------------------------------
  # Windows: portable EXE + Inno Setup installer
  # ---------------------------------------------------------------------------
  windows:
    runs-on: windows-2019
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter config --enable-windows-desktop
      - run: flutter create --project-name tkk_eyeguard --platforms=windows .
      - run: flutter pub get
      - name: Build Windows release
        run: flutter build windows --release
        env:
          CMAKE_GENERATOR: Visual Studio 17 2022
      - name: Package portable zip
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath TKK-EyeGuard-Windows-Portable.zip
        shell: pwsh
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
        shell: pwsh
      - name: Compile installer (Inno Setup)
        run: |
          iscc installers\windows\eyeguard.iss
        shell: cmd
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            TKK-EyeGuard-Windows-Portable.zip
            installers/windows/Output/*.exe

  # ---------------------------------------------------------------------------
  # iOS: unsigned archive (full IPA requires Apple signing — see docs/RELEASE.md)
  # ---------------------------------------------------------------------------
  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter create --project-name tkk_eyeguard --platforms=ios .
      - run: flutter pub get
      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign
      - name: Archive build folder
        run: tar -czf ios-build.tar.gz build/ios/iphoneos
      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: ios-build.tar.gz

  # ---------------------------------------------------------------------------
  # Publish a GitHub Release and attach all artifacts (tag pushes only)
  # ---------------------------------------------------------------------------
  release:
    needs: [android, macos, windows, ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
