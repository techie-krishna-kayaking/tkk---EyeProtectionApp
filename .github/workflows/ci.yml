name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.32.0"

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/lcov.info
          if-no-files-found: ignore

  build-matrix:
    name: Build ${{ matrix.target }}
    needs: analyze-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: android
          - os: macos-latest
            target: macos
          - os: macos-latest
            target: ios
          - os: windows-2019
            target: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable desktop (Windows/macOS)
        if: matrix.target == 'windows' || matrix.target == 'macos'
        run: flutter config --enable-${{ matrix.target }}-desktop

      - name: Scaffold native platform folders
        run: flutter create --project-name tkk_eyeguard --platforms=android,ios,macos,windows,linux .

      - name: Align Android NDK version with plugins
        if: matrix.target == 'android'
        run: |
          python3 - <<'PY'
          from pathlib import Path

          p = Path('android/app/build.gradle.kts')
          s = p.read_text()

          s = s.replace(
            'ndkVersion = flutter.ndkVersion',
            'ndkVersion = "27.0.12077973"',
          )
          if 'isCoreLibraryDesugaringEnabled = true' not in s:
            s = s.replace(
              'compileOptions {',
              'compileOptions {\n        isCoreLibraryDesugaringEnabled = true',
              1,
            )
          if 'coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:' not in s:
            s = s.replace(
              'dependencies {',
              'dependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.5")',
              1,
            )

          p.write_text(s)
          print('Patched android/app/build.gradle.kts successfully')
          PY

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android (debug APK)
        if: matrix.target == 'android'
        run: flutter build apk --debug

      - name: Build macOS (debug)
        if: matrix.target == 'macos'
        run: flutter build macos --debug

      - name: Build iOS (no codesign)
        if: matrix.target == 'ios'
        run: flutter build ios --debug --no-codesign

      - name: Build Windows (debug)
        if: matrix.target == 'windows'
        run: flutter build windows --debug
        env:
          CMAKE_GENERATOR: Visual Studio 17 2022
